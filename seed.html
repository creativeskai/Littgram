<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Littgram Book Seeder</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#100C08; color:#F5EEE3; font-family:'DM Sans',system-ui,sans-serif; padding:20px; min-height:100vh; }
h1 { font-size:22px; font-weight:700; margin-bottom:6px; color:#C9964A; }
.subtitle { font-size:13px; color:#9A8878; margin-bottom:24px; }
.card { background:#1E1610; border-radius:12px; padding:16px; margin-bottom:12px; border:1px solid rgba(255,190,130,.1); }
.book-row { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid rgba(255,190,130,.06); }
.book-row:last-child { border-bottom:none; }
.book-status { width:18px; height:18px; border-radius:50%; flex-shrink:0; display:flex;align-items:center;justify-content:center;font-size:11px; }
.pending  { background:rgba(201,150,74,.2); color:#C9964A; }
.loading  { background:rgba(200,98,74,.2); color:#C8624A; animation:pulse 1s infinite; }
.done     { background:rgba(82,196,26,.2); color:#52c41a; }
.failed   { background:rgba(255,77,109,.2); color:#ff4d6d; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.book-name { font-size:13px; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.book-note { font-size:11px; color:#9A8878; }
.progress-bar { height:6px; background:#2A2018; border-radius:3px; overflow:hidden; margin:12px 0; }
.progress-fill { height:100%; background:linear-gradient(90deg,#C8624A,#C9964A); border-radius:3px; transition:width .3s; }
button { background:#C8624A; color:#fff; border:none; border-radius:10px; padding:12px 24px; font-size:14px; font-weight:700; cursor:pointer; width:100%; }
button:disabled { opacity:.5; cursor:not-allowed; }
.summary { font-size:13px; line-height:1.7; color:#9A8878; }
.log { font-size:11px; color:#9A8878; max-height:200px; overflow-y:auto; background:#100C08; border-radius:8px; padding:10px; margin-top:8px; font-family:monospace; }
</style>
</head>
<body>

<h1>📚 Littgram Book Seeder</h1>
<p class="subtitle">Pre-loads all book text into Firebase so every user gets instant access. Run once as admin.</p>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <div style="font-size:14px;font-weight:700;">Progress</div>
    <div id="summary-count" style="font-size:13px;color:#9A8878;">0 / 0 seeded</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div id="current-status" style="font-size:12px;color:#C9964A;margin-bottom:12px;">Ready to seed</div>
  <button id="seed-btn" onclick="startSeeding()">🌱 Start Seeding All Books</button>
  <div id="log" class="log" style="display:none;"></div>
</div>

<div class="card" id="book-list">
  <div style="font-size:13px;font-weight:700;margin-bottom:10px;">Books (51 with text sources)</div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey:    'AIzaSyA3aB2fNYzSSiWGNL5SM9EmRPGAM71nyQI',
  projectId: 'littgram-54427'
};

const BOOKS = [{"id": "meditations", "title": "Meditations", "native": null, "pdfUrl": "https://www.gutenberg.org/cache/epub/55317/pg55317.txt"}, {"id": "crime", "title": "Crime and Punishment", "native": null, "pdfUrl": "https://www.gutenberg.org/cache/epub/2554/pg2554.txt"}, {"id": "siddhartha", "title": "Siddhartha", "native": null, "pdfUrl": "https://www.gutenberg.org/cache/epub/2413/pg2413.txt"}, {"id": "little_prince", "title": "The Little Prince", "native": null, "pdfUrl": "https://www.gutenberg.org/cache/epub/71975/pg71975.txt"}, {"id": "gora", "title": "Gora", "native": "গোরা", "pdfUrl": "WIKISOURCE:bn:গোরা"}, {"id": "pather_panchali", "title": "Pather Panchali", "native": "পথের পাঁচালী", "pdfUrl": "WIKISOURCE:bn:পথের_পাঁচালী"}, {"id": "chokher_bali", "title": "Chokher Bali", "native": "চোখের বালি", "pdfUrl": "WIKISOURCE:bn:চোখের_বালি"}, {"id": "aranyak", "title": "Aranyak", "native": "আরণ্যক", "pdfUrl": "WIKISOURCE:bn:আরণ্যক"}, {"id": "gitanjali", "title": "Gitanjali", "native": "গীতাঞ্জলি", "pdfUrl": "https://www.gutenberg.org/cache/epub/7164/pg7164.txt"}, {"id": "devdas", "title": "Devdas", "native": "দেবদাস", "pdfUrl": "WIKISOURCE:bn:দেবদাস"}, {"id": "godan", "title": "Godan", "native": "गोदान", "pdfUrl": "WIKISOURCE:hi:गोदान"}, {"id": "madhushala", "title": "Madhushala", "native": "मधुशाला", "pdfUrl": "WIKISOURCE:hi:मधुशाला"}, {"id": "nirmala", "title": "Nirmala", "native": "निर्मला", "pdfUrl": "WIKISOURCE:hi:निर्मला"}, {"id": "shyamchi_aai", "title": "shyamchi_aai", "native": null, "pdfUrl": "WIKISOURCE:mr:श्यामची_आई"}, {"id": "ananda_math", "title": "Ananda Math", "native": "আনন্দমঠ", "pdfUrl": "WIKISOURCE:bn:আনন্দমঠ"}, {"id": "devi_chowdhurani", "title": "Devi Chowdhurani", "native": "দেবী চৌধুরাণী", "pdfUrl": "WIKISOURCE:bn:দেবী_চৌধুরাণী"}, {"id": "bishbrikkho", "title": "Bishbrikkho", "native": "বিষবৃক্ষ", "pdfUrl": "WIKISOURCE:bn:বিষবৃক্ষ"}, {"id": "kapalkundala", "title": "Kapalkundala", "native": "কপালকুণ্ডলা", "pdfUrl": "WIKISOURCE:bn:কপালকুণ্ডলা"}, {"id": "krishnakanter_will", "title": "Krishnakanter Will", "native": "কৃষ্ণকান্তের উইল", "pdfUrl": "WIKISOURCE:bn:কৃষ্ণকান্তের_উইল"}, {"id": "durgesh_nandini", "title": "Durgesh Nandini", "native": "দুর্গেশনন্দিনী", "pdfUrl": "WIKISOURCE:bn:দুর্গেশনন্দিনী"}, {"id": "rajsingha", "title": "Rajsingha", "native": "রাজসিংহ", "pdfUrl": "WIKISOURCE:bn:রাজসিংহ"}, {"id": "radharani", "title": "Radharani", "native": "রাধারাণী", "pdfUrl": "WIKISOURCE:bn:রাধারাণী"}, {"id": "jugalanguriya", "title": "Jugalanguriya", "native": "যুগলাঙ্গুরীয়", "pdfUrl": "WIKISOURCE:bn:যুগলাঙ্গুরীয়"}, {"id": "noukadubi", "title": "Noukadubi", "native": "নৌকাডুবি", "pdfUrl": "WIKISOURCE:bn:নৌকাডুবি"}, {"id": "ghore_baire", "title": "Ghore Baire", "native": "ঘরে বাইরে", "pdfUrl": "WIKISOURCE:bn:ঘরে_বাইরে"}, {"id": "shesher_kabita", "title": "Shesher Kabita", "native": "শেষের কবিতা", "pdfUrl": "WIKISOURCE:bn:শেষের_কবিতা"}, {"id": "golpoguchho", "title": "Golpoguchho", "native": "গল্পগুচ্ছ", "pdfUrl": "WIKISOURCE:bn:গল্পগুচ্ছ"}, {"id": "chitrangada", "title": "Chitrangada", "native": "চিত্রাঙ্গদা", "pdfUrl": "WIKISOURCE:bn:চিত্রাঙ্গদা"}, {"id": "gitabitan", "title": "Gitabitan", "native": "গীতবিতান", "pdfUrl": "WIKISOURCE:bn:গীতবিতান"}, {"id": "chander_pahar", "title": "Chander Pahar", "native": "চাঁদের পাহাড়", "pdfUrl": "WIKISOURCE:bn:চাঁদের_পাহাড়"}, {"id": "adarsha_hindu_hotel", "title": "Adarsha Hindu Hotel", "native": "আদর্শ হিন্দু হোটেল", "pdfUrl": "WIKISOURCE:bn:আদর্শ_হিন্দু_হোটেল"}, {"id": "aparajito", "title": "Aparajito", "native": "অপরাজিত", "pdfUrl": "WIKISOURCE:bn:অপরাজিত"}, {"id": "heera_manik_jwale", "title": "Heera Manik Jwale", "native": "হীরামানিক জ্বলে", "pdfUrl": "WIKISOURCE:bn:হীরামানিক_জ্বলে"}, {"id": "asani_sanket", "title": "Asani Sanket", "native": "আশানি সংকেত", "pdfUrl": "WIKISOURCE:bn:আশানি_সংকেত"}, {"id": "srikanto", "title": "Srikanto", "native": "শ্রীকান্ত", "pdfUrl": "WIKISOURCE:bn:শ্রীকান্ত"}, {"id": "datta", "title": "Datta", "native": "দত্তা", "pdfUrl": "WIKISOURCE:bn:দত্তা"}, {"id": "parineeta", "title": "Parineeta", "native": "পরিণীতা", "pdfUrl": "WIKISOURCE:bn:পরিণীতা"}, {"id": "nishkriti", "title": "Nishkriti", "native": "নিষ্কৃতি", "pdfUrl": "WIKISOURCE:bn:নিষ্কৃতি"}, {"id": "mohesh", "title": "Mohesh", "native": "মহেশ", "pdfUrl": "WIKISOURCE:bn:মহেশ"}, {"id": "grihodaho", "title": "Grihodaho", "native": "গৃহদাহ", "pdfUrl": "WIKISOURCE:bn:গৃহদাহ"}, {"id": "pather_dabi", "title": "Pather Dabi", "native": "পথের দাবী", "pdfUrl": "WIKISOURCE:bn:পথের_দাবী"}, {"id": "charitrahin", "title": "Charitrahin", "native": "চরিত্রহীন", "pdfUrl": "WIKISOURCE:bn:চরিত্রহীন"}, {"id": "shesh_prasna", "title": "Shesh Prasna", "native": "শেষ প্রশ্ন", "pdfUrl": "WIKISOURCE:bn:শেষ_প্রশ্ন"}, {"id": "pallisamaj", "title": "Pallisamaj", "native": "পল্লীসমাজ", "pdfUrl": "WIKISOURCE:bn:পল্লীসমাজ"}, {"id": "janani", "title": "Janani", "native": "জননী", "pdfUrl": "WIKISOURCE:bn:জননী_(মানিক_বন্দ্যোপাধ্যায়)"}, {"id": "dibaratrir_kabya", "title": "Dibaratrir Kabya", "native": "দিবারাত্রির কাব্য", "pdfUrl": "WIKISOURCE:bn:দিবারাত্রির_কাব্য"}, {"id": "putulnacher_itikatha", "title": "Putulnacher Itikatha", "native": "পুতুলনাচের ইতিকথা", "pdfUrl": "WIKISOURCE:bn:পুতুলনাচের_ইতিকথা"}, {"id": "padma_nadir_majhi", "title": "Padma Nadir Majhi", "native": "পদ্মা নদীর মাঝি", "pdfUrl": "WIKISOURCE:bn:পদ্মা_নদীর_মাঝি"}, {"id": "chotushkon", "title": "Chotushkon", "native": "চতুষ্কোণ", "pdfUrl": "WIKISOURCE:bn:চতুষ্কোণ"}, {"id": "byomkesh_bakshi", "title": "Byomkesh Bakshi Samagra", "native": "ব্যোমকেশ বক্সী সমগ্র", "pdfUrl": "WIKISOURCE:bn:সত্যান্বেষী"}, {"id": "oitihasik_kahini", "title": "Oitihasik Kahini Samagra", "native": "ঐতিহাসিক কাহিনী সমগ্র", "pdfUrl": "WIKISOURCE:bn:ঐতিহাসিক_কাহিনী"}];

let fbToken = null;
let seeding = false;
const statusEls = {};

function fbUrl(path) {
  return 'https://firestore.googleapis.com/v1/projects/' + FIREBASE_CONFIG.projectId + '/databases/(default)/documents/' + path;
}

function toFsFields(obj) {
  const fields = {};
  Object.keys(obj).forEach(k => {
    const v = obj[k];
    if (typeof v === 'string')  fields[k] = { stringValue: v };
    else if (typeof v === 'number') fields[k] = { integerValue: String(v) };
    else if (typeof v === 'boolean') fields[k] = { booleanValue: v };
  });
  return fields;
}

async function getFirebaseToken() {
  const r = await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=' + FIREBASE_CONFIG.apiKey, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({returnSecureToken: true})
  });
  const d = await r.json();
  return d.idToken;
}

async function checkAlreadySeeded(bookId) {
  try {
    const r = await fetch(fbUrl('books/' + bookId), {
      headers: {'Authorization': 'Bearer ' + fbToken}
    });
    if (!r.ok) return false;
    const d = await r.json();
    return d.fields && d.fields.totalChunks;
  } catch(e) { return false; }
}

async function saveToFirebase(bookId, text, title) {
  const CHUNK_SIZE = 700 * 1024;
  const chunks = [];
  let pos = 0;
  while (pos < text.length) {
    chunks.push(text.slice(pos, pos + CHUNK_SIZE));
    pos += CHUNK_SIZE;
  }

  // Save metadata doc
  await fetch(fbUrl('books/' + bookId), {
    method: 'PATCH',
    headers: {'Authorization':'Bearer '+fbToken,'Content-Type':'application/json'},
    body: JSON.stringify({fields: toFsFields({
      title, totalChunks: chunks.length, seededAt: Date.now(), seeded: true
    })})
  });

  // Save chunks
  for (let i = 0; i < chunks.length; i++) {
    await fetch(fbUrl('books/' + bookId + '/chunks/' + i), {
      method: 'PATCH',
      headers: {'Authorization':'Bearer '+fbToken,'Content-Type':'application/json'},
      body: JSON.stringify({fields: toFsFields({text: chunks[i], index: i})})
    });
  }
  return chunks.length;
}

async function wikitextToPlain(wt) {
  return wt
    .replace(/\[\[(?:[^\]|]+\|)?([^\]]+)\]\]/g, '$1')
    .replace(/\{\{[^}]*\}\}/g, '')
    .replace(/'{2,3}/g, '')
    .replace(/<[^>]+>/g, '')
    .replace(/^[=*#:;]+\s*/gm, '')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

async function fetchWikisource(pdfUrl) {
  const parts = pdfUrl.split(':');
  const lang = parts[1];
  const title = parts.slice(2).join(':');
  const base = 'https://' + lang + '.wikisource.org/w/api.php';
  
  const r = await fetch(base + '?action=query&prop=revisions&rvprop=content&rvslots=main&format=json&origin=*&titles=' + encodeURIComponent(title));
  const d = await r.json();
  const pg = d.query && d.query.pages && Object.values(d.query.pages)[0];
  const wt = pg && pg.revisions && pg.revisions[0] && (pg.revisions[0]['*'] || (pg.revisions[0].slots && pg.revisions[0].slots.main && pg.revisions[0].slots.main['*']));
  if (!wt) throw new Error('No content');

  const subRe = /\[\[\/([^\]|]+)/g;
  const subs = [];
  let m;
  while ((m = subRe.exec(wt)) !== null) subs.push(title + '/' + m[1].trim());
  const uniqueSubs = [...new Set(subs)];
  
  let allText = await wikitextToPlain(wt);
  
  for (let i = 0; i < uniqueSubs.length; i += 5) {
    const batch = uniqueSubs.slice(i, i + 5);
    try {
      const br = await fetch(base + '?action=query&prop=revisions&rvprop=content&rvslots=main&format=json&origin=*&titles=' + batch.map(encodeURIComponent).join('|'));
      const bd = await br.json();
      const bp = bd.query && bd.query.pages;
      if (bp) {
        for (const p2 of Object.values(bp)) {
          const w2 = p2.revisions && p2.revisions[0] && (p2.revisions[0]['*'] || (p2.revisions[0].slots && p2.revisions[0].slots.main && p2.revisions[0].slots.main['*']));
          if (w2) allText += '\n\n' + await wikitextToPlain(w2);
        }
      }
    } catch(e) {}
    await new Promise(r => setTimeout(r, 200));
  }
  
  if (allText.length < 200) throw new Error('Too short: ' + allText.length);
  return allText;
}

async function fetchGutenberg(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  let t = await r.text();
  const s = t.indexOf('*** START OF');
  if (s > -1) t = t.slice(t.indexOf('\n', s) + 1);
  const e = t.lastIndexOf('*** END OF');
  if (e > -1) t = t.slice(0, e);
  return t.trim();
}

function log(msg) {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function setBookStatus(id, status, note) {
  const el = statusEls[id];
  if (!el) return;
  el.querySelector('.book-status').className = 'book-status ' + status;
  el.querySelector('.book-status').textContent = status==='done'?'✓':status==='failed'?'✗':status==='loading'?'⏳':'·';
  if (note) el.querySelector('.book-note').textContent = note;
}

async function startSeeding() {
  if (seeding) return;
  seeding = true;
  const btn = document.getElementById('seed-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Seeding…';

  try {
    document.getElementById('current-status').textContent = 'Getting Firebase token…';
    fbToken = await getFirebaseToken();
    log('✅ Firebase authenticated');
  } catch(e) {
    log('❌ Firebase auth failed: ' + e.message);
    btn.disabled = false; seeding = false; return;
  }

  let done = 0, failed = 0, skipped = 0;
  const total = BOOKS.length;

  for (let i = 0; i < BOOKS.length; i++) {
    const b = BOOKS[i];
    const name = b.native || b.title;
    document.getElementById('current-status').textContent = '(' + (i+1) + '/' + total + ') ' + name;
    document.getElementById('progress-fill').style.width = ((i/total)*100) + '%';
    setBookStatus(b.id, 'loading', 'Checking…');

    try {
      const already = await checkAlreadySeeded(b.id);
      if (already) {
        setBookStatus(b.id, 'done', 'Already seeded ✓');
        skipped++; done++;
        log('⏭ ' + name + ' — already in Firebase');
        document.getElementById('summary-count').textContent = done + ' / ' + total + ' seeded';
        continue;
      }

      setBookStatus(b.id, 'loading', 'Fetching…');
      let text = '';
      if (b.pdfUrl.startsWith('WIKISOURCE:')) {
        text = await fetchWikisource(b.pdfUrl);
      } else if (b.pdfUrl.includes('gutenberg.org')) {
        text = await fetchGutenberg(b.pdfUrl);
      } else {
        throw new Error('Unknown source');
      }

      setBookStatus(b.id, 'loading', 'Saving to Firebase…');
      const chunks = await saveToFirebase(b.id, text, b.title);
      setBookStatus(b.id, 'done', (text.length/1024).toFixed(0) + 'KB · ' + chunks + ' chunk' + (chunks>1?'s':''));
      done++;
      log('✅ ' + name + ' — ' + (text.length/1024).toFixed(0) + 'KB, ' + chunks + ' chunks');
    } catch(e) {
      failed++;
      setBookStatus(b.id, 'failed', e.message.slice(0,40));
      log('❌ ' + name + ' — ' + e.message);
    }

    document.getElementById('summary-count').textContent = done + ' / ' + total + ' seeded';
    await new Promise(r => setTimeout(r, 300));
  }

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('current-status').textContent = '✅ Complete! ' + done + ' seeded, ' + failed + ' failed';
  btn.textContent = '✅ Seeding Complete';
  log('\n=== DONE: ' + done + ' seeded, ' + skipped + ' already existed, ' + failed + ' failed ===');
  seeding = false;
}

// Render book list
window.onload = function() {
  const list = document.getElementById('book-list');
  BOOKS.forEach(function(b) {
    const row = document.createElement('div');
    row.className = 'book-row';
    row.id = 'row-' + b.id;
    const source = b.pdfUrl.startsWith('WIKISOURCE:') ? b.pdfUrl.split(':')[1].toUpperCase() : 'GUTENBERG';
    row.innerHTML = '<div class="book-status pending">·</div>'
      + '<div class="book-name">' + (b.native || b.title) + '</div>'
      + '<div class="book-note">' + source + '</div>';
    list.appendChild(row);
    statusEls[b.id] = row;
  });
};
</script>
</body>
